services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: morning-brief
    restart: unless-stopped
    env_file:
      - /etc/morning-brief/morning-brief.env
    environment:
      ADMIN_API_HOST: 127.0.0.1
      ADMIN_API_PORT: 8787
      DATA_DIR: /data
      DATABASE_URL: /data/morning-brief.sqlite
      PUBLIC_DIR: /public
    network_mode: host
    volumes:
      - /var/lib/morning-brief/data:/data
      - /var/lib/morning-brief/public:/public
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
